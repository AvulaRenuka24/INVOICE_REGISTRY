<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Registry Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header>
    <h1>Invoice Registry Dashboard</h1>
    <p>Upload • Documents • Invoices • Duplicates</p>
</header>

<div class="container">

    <!-- Upload -->
    <section class="card">
        <h2>Upload Invoice</h2>

        <input type="file" id="pdfFile">

        <button id="uploadBtn">Upload PDF</button>

        <p id="uploadMessage"></p>
    </section>

    <!-- Statistics -->
    <section class="card">
        <h2>Statistics</h2>

        <div id="stats">
            Loading...
        </div>
    </section>

    <!-- Documents -->
    <section class="card">

        <h2>Documents</h2>

        <table id="documentsTable">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Filename</th>
                    <th>Status</th>
                    <th>Uploaded At</th>
                </tr>
            </thead>

            <tbody></tbody>

        </table>

    </section>

    <!-- Invoices -->
    <section class="card">

        <h2>Invoices</h2>

        <table id="invoiceTable">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Invoice No</th>
                    <th>Vendor</th>
                    <th>Date</th>
                    <th>Amount</th>

                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </section>

    <!-- Duplicate Candidates -->

    <section class="card">

        <h2>Duplicate Candidates</h2>

        <table id="duplicateTable">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Invoice 1</th>
                    <th>Invoice 2</th>
                    <th>Vendor Score</th>
                    <th>Status</th>

                </tr>

            </thead>

            <tbody></tbody>

        </table>

    </section>

    <!-- Export -->

    <section class="card">

        <button id="exportBtn">
            Export CSV
        </button>

    </section>

</div>

<script src="/static/script.js"></script>

</body>
</html>
